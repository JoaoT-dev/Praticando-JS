<!DOCTYPE html>
<html lang="pt-br"> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busca Produtos</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <div class="container">
        <h1>Buscar Produtos</h1>
        <label for="codigo-produto">Código do produto:</label>
        <input type="text" id="produto" placeholder="Digite o código do produto (Ex: 01, 25, 50)">
        <button id="botao-buscar">Buscar</button>
        <form class="formulario">
            <label for="nome">Nome</label>
            <input type="text" id="nome" placeholder="---">
            <label for="preco">Preço:</label>
            <input type="text" id="preco" placeholder="---">
            <label for="categoria">Categoria:</label>
            <input type="text" id="categoria" placeholder="---">
        </form>
    </div>
    <script src="scripts/script.js"></script>
</body>
</html>
